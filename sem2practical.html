<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Calculator</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            background-color: #28a745;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }

        .result-box {
            margin-top: 20px;
            font-weight: bold;
        }

        .pass { color: green; }
        .fail { color: red; }
    </style>
</head>

<body>

<div class="container">
    <h2>Student Grade Calculator</h2>

    <div class="input-group">
        <input type="number" id="sub1" placeholder="Subject 1 Marks">
        <input type="number" id="sub2" placeholder="Subject 2 Marks">
        <input type="number" id="sub3" placeholder="Subject 3 Marks">
        <input type="number" id="sub4" placeholder="Subject 4 Marks">
        <input type="number" id="sub5" placeholder="Subject 5 Marks">
    </div>

    <button onclick="calculate()">Calculate</button>

    <div id="result" class="result-box"></div>
</div>

<script>
function calculate() {
    let s1 = parseFloat(document.getElementById('sub1').value);
    let s2 = parseFloat(document.getElementById('sub2').value);
    let s3 = parseFloat(document.getElementById('sub3').value);
    let s4 = parseFloat(document.getElementById('sub4').value);
    let s5 = parseFloat(document.getElementById('sub5').value);

    if (isNaN(s1) || isNaN(s2) || isNaN(s3) || isNaN(s4) || isNaN(s5)) {
        alert("Please enter marks for all subjects");
        return;
    }

    let total = s1 + s2 + s3 + s4 + s5;
    let percentage = (total / 500) * 100;
    let grade = "";
    let resultClass = "pass";

    if (s1 < 35 || s2 < 35 || s3 < 35 || s4 < 35 || s5 < 35) {
        grade = "Fail (Failed in one or more subjects)";
        resultClass = "fail";
    } else if (percentage >= 75) {
        grade = "Distinction";
    } else if (percentage >= 60) {
        grade = "First Class";
    } else if (percentage >= 50) {
        grade = "Second Class";
    } else {
        grade = "Pass Class";
    }

    document.getElementById('result').innerHTML = `
        <p>Total Marks: ${total} / 500</p>
        <p>Percentage: ${percentage.toFixed(2)}%</p>
        <p class="${resultClass}">Result: ${grade}</p>
    `;
}
</script>

</body>
</html>
